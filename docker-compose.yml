version: '3.8'

services:
  web:
    build: .
    container_name: receipt_fastapi_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # PC側のコード変更をコンテナにリアルタイム同期
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: "redis:7-alpine"
    container_name: receipt_redis_kvs
    ports:
      - "6379:6379"
    # 💡 データをメモリ上だけでなく、定期的にディスクに保存する設定（コンテナ再起動対策）
    command: redis-server --save 60 1 --loglevel warning