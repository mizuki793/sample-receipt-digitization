services:
  web:
    build: .
    container_name: receipt_fastapi_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # PC側のコード変更をコンテナにリアルタイム同期
      - ./.env:/app/.env
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb

# メタデータ・ステータス管理用のNoSQL（MongoDB）
  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongo_data:/data/db

  redis:
    image: "redis:7-alpine"
    container_name: receipt_redis_kvs
    ports:
      - "6379:6379"
    # データをメモリ上だけでなく、定期的にディスクに保存する設定（コンテナ再起動対策）
    command: redis-server --save 60 1 --loglevel warning

volumes:
  mongo_data:
