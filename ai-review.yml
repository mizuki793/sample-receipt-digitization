name: AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize] # PRが作成された時と、コードが追加プッシュされた時に実行

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # PRにコメントを書き込む権限
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AI PR Reviewer
        uses: fuxingloh/multi-ai-code-reviewer@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHubが自動発行するトークン
          GEMINI_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        with:
          # xxxx_API_KEYの変更、provider,modelの変更で他のreviewも利用可能(ex:provider: anthropic,model: "claude-3-5-sonnet")
          provider: gemini
          model: "gemini-2.5-flash"
          debug: false
          review_simple_changes: false
          # レビューの振る舞いをカスタマイズ
          system_message: |
            あなたは優秀なシニアバックエンドエンジニア（FastAPIの専門家）です。
            Pull Requestのコード差分をレビューし、以下の観点でフィードバックをしてください。
            1. FastAPIのベストプラクティス（async/awaitの適切な使用、Pydanticの型定義など）に沿っているか
            2. メソッド名や変数名が直感的で、命名規則（Pythonの型、snake_caseなど）に則っているか
            3. バグやセキュリティ上の脆弱性、不要なコードが含まれていないか
            4. 指摘する際は、1つのIssue/PRとして独立して扱える「小さな範囲」に留めてください。
            返答は必ず「日本語」で行い、具体的かつ建設的なアドバイスを心がけてください。